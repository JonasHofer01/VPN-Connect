name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test (syntax)
        run: python -m py_compile vpn_connect.py

      - name: Import test
        run: python -c "import vpn_connect; print('import ok')"

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name VPN_Connect --uac-admin vpn_connect.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: VPN_Connect
          path: dist/VPN_Connect.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VPN_Connect.exe
          generate_release_notes: true

